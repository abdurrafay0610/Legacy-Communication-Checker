<!doctype html>
<html>
<head>
  <meta charset="utf-8">
  <title>Packet Sender — Send</title>
  <meta name="viewport" content="width=device-width, initial-scale=1"/>
  <link rel="stylesheet" href="{{ url_for('static', filename='styles.css') }}">
  <style>
    .toggle-row { display: flex; gap: 10px; }
    .toggle-btn {
      flex: 1; padding: 10px; border-radius: 12px; border: 1px solid var(--border);
      background: #0e141b; color: var(--muted); font-weight: 600; cursor: pointer;
      transition: background 0.15s, color 0.15s;
    }
    .toggle-btn.active-valid   { background: #0f2e1a; color: #4cde87; border-color: #4cde87; }
    .toggle-btn.active-invalid { background: #2e0f0f; color: #ff6161; border-color: #ff6161; }
    .badge {
      display: inline-block; padding: 2px 10px; border-radius: 99px;
      font-size: 12px; font-weight: 700; margin-left: 8px;
    }
    .badge-valid   { background: #0f2e1a; color: #4cde87; }
    .badge-invalid { background: #2e0f0f; color: #ff6161; }
  </style>
</head>
<body>
<div class="container">
  <header>
    <h1>Send Packet</h1>
    <nav>
      <a href="{{ url_for('define_page') }}">Define</a>
      <a href="{{ url_for('send_page') }}">Send</a>
    </nav>
  </header>

  <!-- Step 1: choose packet -->
  <section class="card">
    <h2>1) Choose Packet</h2>
    <label>Packet
      <select id="packet_name">
        <option value="">-- choose --</option>
        {% for p in packets %}
          <option value="{{ p[pkt_name_key] }}">{{ p[pkt_name_key] }}</option>
        {% endfor %}
      </select>
    </label>
  </section>

  <!-- Step 2: valid or invalid -->
  <section class="card">
    <h2>2) Packet Validity</h2>
    <p style="color:var(--muted);font-size:13px;margin:0 0 10px">
      <strong>Valid</strong> — correct checksum / CRC appended. &nbsp;
      <strong>Invalid</strong> — a random data byte is bit-flipped so validation fails on the receiver.
    </p>
    <div class="toggle-row">
      <button class="toggle-btn active-valid" id="btnValid"   onclick="setValidity(true)">✓ Valid Packet</button>
      <button class="toggle-btn"              id="btnInvalid" onclick="setValidity(false)">✗ Invalid Packet</button>
    </div>
  </section>

  <!-- Step 3: transport scheme -->
  <section class="card">
    <h2>3) Sending Scheme</h2>
    <label>Scheme
      <select id="scheme" onchange="setParams()">
        <option value="UDP">UDP</option>
        <option value="TCP">TCP</option>
        <option value="SERIAL">Serial</option>
      </select>
    </label>
  </section>

  <!-- Step 4: scheme parameters -->
  <section class="card">
    <h2>4) Parameters</h2>
    <div id="params"></div>
  </section>

  <!-- Send -->
  <section class="card">
    <button id="sendBtn">Send</button>
    <pre id="result" class="result" style="margin-top:12px"></pre>
  </section>
</div>

<script>
// ---------------------------------------------------------------------------
// State
// ---------------------------------------------------------------------------
let isValid = true;

function setValidity(v) {
  isValid = v;
  document.getElementById("btnValid").className   = "toggle-btn" + (v  ? " active-valid"   : "");
  document.getElementById("btnInvalid").className = "toggle-btn" + (!v ? " active-invalid" : "");
}

// ---------------------------------------------------------------------------
// Scheme parameter UI
// ---------------------------------------------------------------------------
function schemeParamsUI(s) {
  if (s === "UDP") {
    return `
      <div class="grid grid-2">
        <label>Host <input id="host" placeholder="127.0.0.1" value="127.0.0.1"></label>
        <label>Port <input id="port" type="number" min="1" max="65535" value="9000"></label>
      </div>`;
  }
  if (s === "TCP") {
    return `
      <div class="grid grid-2">
        <label>Host    <input id="host"    placeholder="127.0.0.1" value="127.0.0.1"></label>
        <label>Port    <input id="port"    type="number" min="1" max="65535" value="9000"></label>
        <label>Timeout (s) <input id="timeout" type="number" min="0" step="0.1" value="2.0"></label>
      </div>`;
  }
  if (s === "SERIAL") {
    return `
      <div class="grid grid-2">
        <label>Port <input id="port_name" placeholder="/dev/ttyUSB0" value="/dev/ttyUSB0"></label>
        <label>Baud <input id="baud" type="number" value="115200"></label>
      </div>`;
  }
  return "";
}

function setParams() {
  const s = document.getElementById("scheme").value;
  document.getElementById("params").innerHTML = schemeParamsUI(s);
}
setParams();

// ---------------------------------------------------------------------------
// Collect params
// ---------------------------------------------------------------------------
function collectParams(scheme) {
  if (scheme === "UDP") {
    return {
      host: document.getElementById("host").value || "127.0.0.1",
      port: parseInt(document.getElementById("port").value || "9000", 10),
    };
  }
  if (scheme === "TCP") {
    return {
      host:    document.getElementById("host").value    || "127.0.0.1",
      port:    parseInt(document.getElementById("port").value    || "9000", 10),
      timeout: parseFloat(document.getElementById("timeout").value || "2.0"),
    };
  }
  if (scheme === "SERIAL") {
    return {
      port_name: document.getElementById("port_name").value || "/dev/ttyUSB0",
      baud:      parseInt(document.getElementById("baud").value || "115200", 10),
    };
  }
  return {};
}

// ---------------------------------------------------------------------------
// Send
// ---------------------------------------------------------------------------
async function send() {
  const packet_name = document.getElementById("packet_name").value;
  if (!packet_name) { alert("Please choose a packet first."); return; }

  const scheme = document.getElementById("scheme").value;
  const params = collectParams(scheme);

  const body = { packet_name, scheme, valid: isValid, params };

  document.getElementById("result").textContent = "Sending…";

  const resp = await fetch("/api/send", {
    method: "POST",
    headers: { "Content-Type": "application/json" },
    body: JSON.stringify(body),
  });
  const data = await resp.json();

  // Pretty-print with a validity badge in the raw JSON area
  let display = JSON.stringify(data, null, 2);
  document.getElementById("result").textContent = display;
}

document.getElementById("sendBtn").addEventListener("click", () =>
  send().catch(e => {
    document.getElementById("result").textContent = JSON.stringify({ ok: false, error: e.message }, null, 2);
  })
);
</script>
</body>
</html>
